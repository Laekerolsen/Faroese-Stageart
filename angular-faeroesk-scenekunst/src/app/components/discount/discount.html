<div class="discount" animate.enter="enter-animation-discount" animate.leave="leaving-animation-discount">
<input *ngIf="basket().lines.length;" class="input-discount" [(ngModel)]="code" placeholder="Rabatkode" animate.enter="enter-animation-discount" animate.leave="leaving-animation-discount" />
<button *ngIf="basket().lines.length;" class="px-4 py-2 bg-yellow-600 text-white rounded hover:bg-yellow-700" (click)="apply()" animate.enter="enter-animation-discount" animate.leave="leaving-animation-discount">Gem</button>
</div>
