

<div *ngIf="basket().lines.length;" class="basket-small" animate.enter="enter-animation" animate.leave="leaving">
    <p class="text-1xl font-bold mb-8">Indkøbskurv</p>

    <div *ngFor="let line of basket().lines" class="line" animate.enter="enter-animation-line" animate.leave="leaving-line">
      <button class="remove px-4 py-2 bg-red-600 text-1xl text-white rounded hover:bg-red-700" (click)="remove(line.productId)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M183.1 137.4C170.6 124.9 150.3 124.9 137.8 137.4C125.3 149.9 125.3 170.2 137.8 182.7L275.2 320L137.9 457.4C125.4 469.9 125.4 490.2 137.9 502.7C150.4 515.2 170.7 515.2 183.2 502.7L320.5 365.3L457.9 502.6C470.4 515.1 490.7 515.1 503.2 502.6C515.7 490.1 515.7 469.8 503.2 457.3L365.8 320L503.1 182.6C515.6 170.1 515.6 149.8 503.1 137.3C490.6 124.8 470.3 124.8 457.8 137.3L320.5 274.7L183.1 137.4z"/></svg>
      </button>
      <p class="text-1xl pname pleft">
        {{ line.productName }}
      </p>

      <p class="text-1xl line-quantity">{{ line.quantity }} x</p>

      <p class="text-1xl quantity">
        {{ line.totalInclVat | number:'1.2-2' }} 
      </p>
    </div>

    <div role="separator" aria-label="Divider" class="divider"></div>
    
    <div *ngIf="basket().shippingInclVat > 0" class="text-1xl p-right">Fragt: {{ basket().shippingInclVat | number:'1.2-2' }} {{ basket().currency }}</div>
    <p class="text-1xl p-right"><strong>Total: {{ basket().totalInclVat | number:'1.2-2' }} {{ basket().currency }}</strong></p>

    <p>
      <button class="px-4 py-2 bg-blue-600 text-1xl text-white rounded hover:bg-blue-700" (click)="checkout()">Gå til kurven</button>
    </p>
</div>
