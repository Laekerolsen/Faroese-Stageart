<main *ngIf="post$ | async as post; else loading" class="container mx-auto min-h-screen max-w-3xl p-8 flex flex-col gap-4">
      <a routerLink="/" class="hover:underline">← Back to posts</a>
      <h1 class="text-4xl font-bold mb-8">{{ post.title }}</h1>
      <img class="aspect-video rounded-xl" *ngIf="post.image" [src]="urlFor(post.image).width(550).height(310).url()" width="550" height="310" />
      <div class="prose">
        <p>
          Published: {{ post?.publishedAt | date }}
        </p>

        <!-- Simple rendering (PortableText equivalent requires extra lib) -->
        <div *ngIf="post?.body">
          <pre>{{ post.body | json }}</pre>
        </div>
      </div>
</main>

<ng-template #loading>
  <p>Post not found...</p>
</ng-template>
