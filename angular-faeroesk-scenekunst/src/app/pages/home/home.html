<main *ngIf="hasLoaded" class="container mx-auto min-h-screen max-w-3xl p-8">
      <h1 class="text-4xl font-bold mb-8">Posts</h1>

      <ul class="flex flex-col gap-y-4">
        
        <li *ngFor="let post of posts$ | async" class="hover:underline">
          <a [routerLink]="['/', post.slug.current]">
            <h2 class="text-xl font-semibold">{{ post.title }}</h2>
            <p>{{ post.publishedAt | date }}</p>
          </a>
        </li>
      </ul>
    </main>
